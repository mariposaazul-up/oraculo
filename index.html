<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oráculo</title>

<style>

body{
  margin:0;
  background:transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

img{
  width:220px;
  transition:0.3s;
}

.glow{
  animation: glowFinal 2s ease-in-out;
}

@keyframes glowFinal{
  0%{
    filter: drop-shadow(0 0 0px transparent);
  }
  50%{
    filter: drop-shadow(0 0 25px rgba(255,255,255,0.9))
            drop-shadow(0 0 40px rgba(255,255,255,0.6));
  }
  100%{
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
  }
}

#oraculoFrame{
  width:240px;
  height:414px;
  border:none;
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<img id="carta" src="oraculo/carta1.jpg">

<script>

const carta = document.getElementById("carta")

const cartas = []
for(let i=1; i<=55; i++){
  cartas.push(`oraculo/${i}.jpg`)
}

let interval = null

function iniciarOraculo(){

  let tiempo = 1500
  let velocidad = 80

  interval = setInterval(()=>{
    let random = Math.floor(Math.random()*cartas.length)
    carta.src = cartas[random]
  }, velocidad)

  setTimeout(()=>{
    clearInterval(interval)

    let final = Math.floor(Math.random()*cartas.length)
    carta.src = cartas[final]

    carta.classList.remove("glow")
    void carta.offsetWidth
    carta.classList.add("glow")

  }, tiempo)
}

window.addEventListener("message", (event)=>{
  if(event.data === "activar-oraculo"){
    iniciarOraculo()
  }
})

</script>

</body>
</html>
